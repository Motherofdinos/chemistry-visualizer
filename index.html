<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Хімічний Візуалізатор Реакцій</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">
    <div class="container">
        <aside class="sidebar">
            <h1>🧪 Хімічні Реакції</h1>
            
            <div class="selection-group">
                <label for="topic-select">Обери тему:</label>
                <select id="topic-select">
                    <option value="">-- Оберіть тему --</option>
                </select>
            </div>

            <div class="selection-group">
                <label for="reaction-select">Обери реакцію:</label>
                <select id="reaction-select" disabled>
                    <option value="">-- Спочатку оберіть тему --</option>
                </select>
            </div>

            <div id="reaction-info" class="info-card">
                <h3 id="reaction-title">Оберіть реакцію</h3>
                <p id="reaction-equation" class="equation"></p>
                <div class="stats">
                    <div id="reactant-stats"></div>
                    <div id="product-stats"></div>
                </div>
            </div>

            <div id="atom-legend" class="atom-legend" style="display:none">
                <span class="legend-title">Атоми в реакції:</span>
                <div id="legend-items" class="legend-items"></div>
            </div>

            <div class="theme-switcher">
                <span class="theme-label">Тема:</span>
                <button class="theme-btn active" data-theme="dark" title="Темна">🌑</button>
                <button class="theme-btn" data-theme="light" title="Світла">☀️</button>
                <button class="theme-btn" data-theme="lab" title="Лабораторія">🔬</button>
                <button class="theme-btn" data-theme="space" title="Космос">🚀</button>
            </div>

            <div class="controls">
                <button id="show-reactants">⬅ Реагенти</button>
                <button id="show-products">Продукти ➡</button>
            </div>
            <button id="animate-btn" class="animate-btn">▶ Анімувати реакцію</button>
            <div id="speed-control" class="speed-control" style="display:none">
                <div class="speed-labels">
                    <span>🐢 Повільно</span>
                    <span>Нормально</span>
                    <span>Швидко ⚡</span>
                </div>
                <input type="range" id="speed-slider" min="1" max="3" value="2" step="1">
            </div>
            
            <footer>
                <p>Зроблено з ❤️ для Vibecoding Lab</p>
            </footer>
        </aside>

        <main id="canvas-container">
            <div id="loading-overlay">Завантаження...</div>
            <div id="mol-popup" class="mol-popup" style="display:none">
                <button id="popup-close" class="popup-close">✕</button>
                <div id="popup-name" class="popup-name"></div>
                <div id="popup-formula" class="popup-formula"></div>
                <div id="popup-mass" class="popup-mass"></div>
            </div>
        </main>
    </div>

    <!-- Three.js Library -->
    <script type="importmap">
        {
          "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
          }
        }
    </script>
    <script type="module" src="visualizer.js"></script>
</body>
</html>
